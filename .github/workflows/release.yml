name: Release
run-name: Release by @${{ github.actor }}

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}  # Deny all permissions by default at workflow level

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for pushing tags and creating releases
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Calculate next version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0)
          LAST_VERSION="${LAST_TAG#v}"
          IFS='.' read -r MAJOR MINOR <<< "$LAST_VERSION"
          echo "new_tag=v${MAJOR}.$((MINOR + 1))" >> "$GITHUB_OUTPUT"
          echo "last_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          WORKFLOW_ACCESS_TOKEN: ${{ secrets.WORKFLOW_ACCESS_TOKEN }}
        run: |
          git tag "${{ steps.version.outputs.new_tag }}"
          git remote set-url origin "https://x-access-token:${WORKFLOW_ACCESS_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "${{ steps.version.outputs.new_tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
          LAST_TAG: ${{ steps.version.outputs.last_tag }}
        run: |
          NOTES=$(git log "${LAST_TAG}..${NEW_TAG}" --pretty='- %h %s')
          gh release create "$NEW_TAG" --notes "$NOTES"

  build-and-push:
    runs-on: ubuntu-latest
    needs: release

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GitLab Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: gitlab-registry.cern.ch
          username: ${{ github.actor }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - name: Build and push image to GitLab
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          push: true
          tags: gitlab-registry.cern.ch/swan/docker-images/jupyterhub:${{ needs.release.outputs.new_tag }}

  update-swan-charts:
    runs-on: ubuntu-latest
    needs: [release, build-and-push]

    steps:
      - name: Trigger image version update in swan-charts
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_ACCESS_TOKEN }}
        run: |
          gh workflow run "Update jupyter and jupyterhub images" \
            --repo swan-cern/swan-charts \
            --ref master \
            -f image=jupyterhub \
            -f version="${{ needs.release.outputs.new_tag }}"
